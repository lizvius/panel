<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1f2937" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AzurLize - Recruitment Platform</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            indigo: {
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca'
            }
          }
        }
      }
    }
  </script>
  <script type="module" src="https://unpkg.com/@phosphor-icons/web"></script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    Babel.registerPreset('react-classic', {
      presets: [
        [Babel.availablePresets['react'], {
          runtime: 'classic'
        }]
      ]
    });
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background-color: #F8FAFC;
      transition: background-color 0.3s;
      -webkit-tap-highlight-color: transparent;
    }

    html.dark body {
      background-color: #111827;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: #cbd5e1;
      border-radius: 10px;
    }

    html.dark .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: #4b5563;
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    .ph-spin {
      animation: spin 1s linear infinite;
    }

    .min-h-dvh {
      min-height: 100dvh;
    }

    .h-dvh {
      height: 100dvh;
    }
  </style>
</head>

<body class="text-gray-900 dark:text-gray-100 overflow-hidden antialiased">

  <div id="root"></div>

  <script type="text/babel" data-presets="react-classic">
    const { useState, useEffect, useRef } = React;

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzDrmJ8WbMTy5RBKNdmBfMXIL0CKYT8xTteOqGolCPDoD8G5Ra65Yzh3N-sjLuKlRpg/exec';

        const DB = {
            payroll: []
        };

        const Card = ({ children, className = '' }) => (
            <div className={`bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm overflow-hidden transition-colors ${className}`}>{children}</div>
        );

        const Badge = ({ children, variant = 'default', className = '' }) => {
            const variants = {
                default: 'bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-200',
                success: 'bg-emerald-100 text-emerald-800 dark:bg-emerald-900/40 dark:text-emerald-400',
                warning: 'bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-400',
                danger: 'bg-rose-100 text-rose-800 dark:bg-rose-900/40 dark:text-rose-400',
                indigo: 'bg-indigo-100 text-indigo-800 dark:bg-indigo-900/40 dark:text-indigo-400',
            };
            return <span className={`px-2.5 py-1 rounded-full text-xs font-bold transition-colors ${variants[variant]} ${className}`}>{children}</span>;
        };

        const ProgressBar = ({ progress, label, color = 'bg-indigo-500' }) => (
            <div className="w-full">
                <div className="flex justify-between text-sm mb-1.5"><span className="font-medium text-gray-700 dark:text-gray-300">{label}</span><span className="text-gray-500 dark:text-gray-400 font-medium">{progress}%</span></div>
                <div className="w-full bg-gray-100 dark:bg-gray-700 rounded-full h-2.5"><div className={`h-2.5 rounded-full ${color} transition-all duration-1000 ease-out`} style={{ width: `${progress}%` }}></div></div>
            </div>
        );

        const AuthLayout = ({ children, title, subtitle }) => (
            <div className="min-h-dvh flex items-center justify-center bg-[#F8FAFC] dark:bg-gray-900 p-4 transition-colors duration-300 relative overflow-hidden">
                <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-500/20 rounded-full blur-3xl pointer-events-none"></div>
                <Card className="w-full max-w-md p-6 sm:p-8 relative z-10 shadow-2xl shadow-indigo-100 dark:shadow-none border-t-4 border-t-indigo-600">
                
                    <div className="flex justify-center mb-6">
                        <div className="w-14 h-14 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(99,102,241,0.4)] border-t border-indigo-400/50 relative overflow-hidden group">
                            <div className="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                            <svg className="w-8 h-8 text-white relative z-10 drop-shadow-lg group-hover:scale-110 transition-transform duration-300" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 2L3 21H7.5L12 11L16.5 21H21L12 2Z" fill="currentColor"/>
                                <path d="M9.5 15H14.5L12 9.5L9.5 15Z" fill="currentColor" fillOpacity="0.4"/>
                            </svg>
                        </div>
                    </div>
                    
                    <div className="text-center mb-8">
                        <h1 className="text-2xl font-bold text-gray-900 dark:text-white mb-2">Team <span className="text-indigo-600">AzurLize</span></h1>
                        <p className="text-sm text-gray-500">{title}</p>
                        {subtitle && <p className="text-xs text-gray-400 mt-1">{subtitle}</p>}
                    </div>
                    {children}
                </Card>
            </div>
        );

        const Login = ({ onLogin, onNavigateRegister }) => {
            const [showPassword, setShowPassword] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');
            const [formData, setFormData] = useState({ username: '', password: '' });

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsLoading(true); setErrorMsg('');

                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            action: 'login', 
                            username: formData.username.trim(), 
                            password: formData.password 
                        })
                    });
                    const result = await response.json();
                    
                    if (result.status === 'success') onLogin(result.user);
                    else setErrorMsg(result.message || 'Username atau password salah.');
                } catch (error) { setErrorMsg('Terjadi kesalahan koneksi. Pastikan perangkat Anda online.'); } 
                finally { setIsLoading(false); }
            };

            const inputClass = "w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-medium transition-all";

            return (
                <AuthLayout title="L O G I N">
                    {errorMsg && <div className="mb-4 p-3 bg-rose-50 text-rose-600 rounded-xl text-xs flex items-center"><i className="ph-bold ph-warning-circle mr-2"></i><b>{errorMsg}</b></div>}
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div className="relative"><i className="ph-bold ph-user absolute left-3 top-1/2 -translate-y-1/2 text-xl text-gray-400"></i><input type="text" placeholder="Input Username" value={formData.username} onChange={e => setFormData({...formData, username: e.target.value})} className={inputClass} disabled={isLoading} required /></div>
                        <div className="relative"><i className="ph-bold ph-lock-key absolute left-3 top-1/2 -translate-y-1/2 text-xl text-gray-400"></i><input type={showPassword ? "text" : "password"} placeholder="Password" value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} className={inputClass} disabled={isLoading} required /><button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"><i className={`ph-bold ${showPassword ? 'ph-eye-slash' : 'ph-eye'} text-xl`}></i></button></div>
                        <button type="submit" disabled={isLoading} className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-all flex items-center justify-center disabled:opacity-70">{isLoading ? <><i className="ph-bold ph-spinner ph-spin text-xl mr-2"></i> Memverifikasi...</> : "Masuk"}</button>
                    </form>
                    <div className="mt-6 text-center text-sm text-gray-500"><button onClick={onNavigateRegister} className="text-indigo-600 font-bold hover:underline">Daftar Akun Baru</button></div>
                </AuthLayout>
            );
        };

        const Register = ({ onRegister, onNavigateLogin }) => {
            const [isLoading, setIsLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');
            const [successMsg, setSuccessMsg] = useState('');
            const [formData, setFormData] = useState({ name: '', username: '', uid: '', password: '' });

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsLoading(true); setErrorMsg(''); setSuccessMsg('');

                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            action: 'register', 
                            name: formData.name.trim(), 
                            username: formData.username.trim(), 
                            uid: formData.uid.trim(), 
                            password: formData.password 
                        })
                    });
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        setSuccessMsg(result.message);
                        setFormData({ name: '', username: '', uid: '', password: '' });
                        setTimeout(() => onNavigateLogin(), 3000);
                    } else { setErrorMsg(result.message || 'Gagal mendaftar.'); }
                } catch (error) { setErrorMsg('Terjadi kesalahan koneksi.'); } 
                finally { setIsLoading(false); }
            };

            const inputClass = "w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-medium transition-all";

            return (
                <AuthLayout title="Buat Akun Baru" subtitle="Pendaftaran Tim Operations">
                    {errorMsg && <div className="mb-4 p-3 bg-rose-50 text-rose-600 rounded-xl text-xs flex items-center"><i className="ph-bold ph-warning-circle mr-2"></i><b>{errorMsg}</b></div>}
                    {successMsg && <div className="mb-4 p-3 bg-emerald-50 text-emerald-600 rounded-xl text-xs flex items-center"><i className="ph-bold ph-check-circle mr-2"></i><b>{successMsg}</b></div>}
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div className="relative"><i className="ph-bold ph-identification-card absolute left-3 top-1/2 -translate-y-1/2 text-xl text-gray-400"></i><input type="text" placeholder="Nama Lengkap" value={formData.name} required onChange={e => setFormData({...formData, name: e.target.value})} className={inputClass} disabled={isLoading || successMsg}/></div>
                        <div className="relative"><i className="ph-bold ph-user absolute left-3 top-1/2 -translate-y-1/2 text-xl text-gray-400"></i><input type="text" placeholder="Username TG (Tanpa Spasi)" value={formData.username} required onChange={e => setFormData({...formData, username: e.target.value})} className={inputClass} disabled={isLoading || successMsg}/></div>
                        <div className="relative"><i className="ph-bold ph-hash absolute left-3 top-1/2 -translate-y-1/2 text-xl text-gray-400"></i><input type="text" placeholder="UID Anda" value={formData.uid} required onChange={e => setFormData({...formData, uid: e.target.value})} className={inputClass} disabled={isLoading || successMsg}/></div>
                        <div className="relative"><i className="ph-bold ph-lock-key absolute left-3 top-1/2 -translate-y-1/2 text-xl text-gray-400"></i><input type="password" placeholder="Password" value={formData.password} required onChange={e => setFormData({...formData, password: e.target.value})} className={inputClass} disabled={isLoading || successMsg}/></div>
                        <button type="submit" disabled={isLoading || successMsg} className="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold transition-colors">{isLoading ? 'Memproses...' : 'Daftar Sekarang'}</button>
                    </form>
                    <div className="mt-6 text-center text-sm text-gray-500"><button onClick={onNavigateLogin} className="text-indigo-600 font-bold hover:underline">Sudah punya akun? Masuk</button></div>
                </AuthLayout>
            );
        };

        const ANNOUNCEMENT_CHANNELS = [
            { id: 'rules', name: 'Rules', icon: 'ph-push-pin', color: 'rose' },
            { id: 'announcement', name: 'Announcement', icon: 'ph-megaphone', color: 'indigo' },
            { id: 'bonus', name: 'Bonus & Reward', icon: 'ph-confetti', color: 'amber' },
            { id: 'event', name: 'Event', icon: 'ph-calendar-blank', color: 'emerald' },
            { id: 'general', name: 'General Discussion', icon: 'ph-chats', color: 'blue' }
        ];

        const AnnouncementCenter = ({ authUser }) => {
            const [activeChannel, setActiveChannel] = useState('announcement');
            const [posts, setPosts] = useState([]);
            const [newContent, setNewContent] = useState('');
            const [replyContent, setReplyContent] = useState({});
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            
            const [editingPost, setEditingPost] = useState(null);
            const [editContent, setEditContent] = useState('');
            const chatEndRef = useRef(null);

            const canPost = (channelId) => {
                if (channelId === 'general') return true;
                return ['Superadmin', 'Admin'].includes(authUser.role);
            };

            const canPin = () => ['Superadmin', 'Admin'].includes(authUser.role);

            const canEdit = (p) => {
                if (authUser.role === 'Superadmin') return true; 
                if (authUser.role === 'Admin' && p.author === authUser.name) return true; 
                if (authUser.role === 'Staff' && p.author === authUser.name) return true; 
                return false;
            };

            const canDelete = (p) => {
                if (authUser.role === 'Superadmin') return true; 
                if (authUser.role === 'Admin') {
                    if (p.author === authUser.name) return true; 
                    if (p.role === 'Staff') return true; 
                    return false;
                }
                if (authUser.role === 'Staff' && p.author === authUser.name) return true; 
                return false;
            };

            const fetchPosts = async () => {
                if (!SCRIPT_URL) return;
                try {
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getAnnouncements' }) });
                    const result = await response.json();
                    if (result.status === 'success') {
                        setPosts(prevPosts => {
                            const pendingPosts = prevPosts.filter(p => p.isPending || p.isDeleting);
                            const safeData = Array.isArray(result.data) ? result.data : [];
                            const fetchedIds = new Set(safeData.map(p => String(p.id)));
                            const remainingPending = pendingPosts.filter(p => !fetchedIds.has(String(p.id)) && p.isPending);
                            
                            const mergedPosts = safeData.map(serverPost => {
                                const localPost = prevPosts.find(p => String(p.id) === String(serverPost.id));
                                if (localPost && localPost.isDeleting) return { ...serverPost, isDeleting: true };
                                if (localPost && localPost.isEditing) return { ...serverPost, isEditing: true, content: localPost.content };
                                
                                if (localPost && localPost.comments) {
                                    const pendingComments = localPost.comments.filter(c => c.isPending);
                                    const fetchedCommentIds = new Set(serverPost.comments.map(c => String(c.id)));
                                    const remainingPendingComments = pendingComments.filter(c => !fetchedCommentIds.has(String(c.id)));
                                    return { ...serverPost, comments: [...serverPost.comments, ...remainingPendingComments] };
                                }
                                return serverPost;
                            });

                            const finalPosts = [...remainingPending, ...mergedPosts];
                            localStorage.setItem('recruitOps_announcements', JSON.stringify(finalPosts.filter(p => !p.isPending && !p.isDeleting)));
                            return finalPosts;
                        });
                    }
                } catch (error) {
                    const saved = localStorage.getItem('recruitOps_announcements');
                    if (saved) {
                        setPosts(prevPosts => {
                            const pendingPosts = prevPosts.filter(p => p.isPending || p.isDeleting);
                            const savedPosts = JSON.parse(saved);
                            const savedIds = new Set(savedPosts.map(p => String(p.id)));
                            const remainingPending = pendingPosts.filter(p => !savedIds.has(String(p.id)) && p.isPending);
                            
                            const mergedSaved = savedPosts.map(sp => {
                                const lp = prevPosts.find(p => String(p.id) === String(sp.id));
                                if (lp && lp.isDeleting) return { ...sp, isDeleting: true };
                                if (lp && lp.isEditing) return { ...sp, isEditing: true, content: lp.content };
                                return sp;
                            });

                            return [...remainingPending, ...mergedSaved];
                        });
                    }
                }
            };

            useEffect(() => {
                fetchPosts();
                const interval = setInterval(fetchPosts, 5000); 
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (activeChannel === 'general' && chatEndRef.current) {
                    chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [posts, activeChannel]);

            const handlePost = async (e) => {
                e.preventDefault();
                if (!newContent.trim()) return;
                const tempId = Date.now();
                const newPost = { id: tempId, channelId: activeChannel, author: authUser.name, role: authUser.role, content: newContent, timestamp: new Date().toISOString(), likes: [], comments: [], pinned: false, isPending: true };
                
                setPosts(prev => [newPost, ...prev]);
                setNewContent('');

                try {
                    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'addAnnouncement', ...newPost }) });
                    setPosts(prev => prev.map(p => p.id === tempId ? { ...p, isPending: false } : p));
                } catch(err) { console.error("Gagal posting"); }
            };

            const handleToggleLike = async (postId) => {
                const post = posts.find(p => p.id === postId);
                if (!post) return;
                const hasLiked = post.likes.includes(authUser.name);
                const newLikes = hasLiked ? post.likes.filter(n => n !== authUser.name) : [...post.likes, authUser.name];
                
                setPosts(posts.map(p => p.id === postId ? { ...p, likes: newLikes } : p));
                try { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateAnnouncement', id: postId, likes: newLikes }) }); } catch(err) { }
            };

            const handleTogglePin = async (postId) => {
                const post = posts.find(p => p.id === postId);
                if (!post) return;
                const newPinned = !post.pinned;

                setPosts(posts.map(p => p.id === postId ? { ...p, pinned: newPinned } : p));
                try { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateAnnouncement', id: postId, pinned: newPinned }) }); } catch(err) { }
            };

            const handleDelete = async (postId) => {
                if (!window.confirm("Yakin ingin menghapus pesan ini?")) return;
                setPosts(prev => prev.map(p => p.id === postId ? { ...p, isDeleting: true } : p));

                try {
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteAnnouncement', id: postId }) });
                    const result = await response.json();
                    if (result.status === 'success') { setPosts(prev => prev.filter(p => p.id !== postId)); } 
                    else { alert("Gagal menghapus: " + result.message); setPosts(prev => prev.map(p => p.id === postId ? { ...p, isDeleting: false } : p)); }
                } catch(err) { alert("Kesalahan koneksi."); setPosts(prev => prev.map(p => p.id === postId ? { ...p, isDeleting: false } : p)); }
            };

            const handleEditSubmit = async (e) => {
                e.preventDefault();
                if (!editContent.trim()) return;
                const postId = editingPost.id;
                
                setPosts(prev => prev.map(p => p.id === postId ? { ...p, content: editContent, isEditing: true } : p));
                setEditingPost(null); setEditContent('');

                try {
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateAnnouncement', id: postId, content: editContent }) });
                    const result = await response.json();
                    if (result.status === 'success') { setPosts(prev => prev.map(p => p.id === postId ? { ...p, isEditing: false } : p)); } 
                    else { alert("Gagal mengedit pesan."); setPosts(prev => prev.map(p => p.id === postId ? { ...p, isEditing: false } : p)); }
                } catch(err) { alert("Kesalahan koneksi."); setPosts(prev => prev.map(p => p.id === postId ? { ...p, isEditing: false } : p)); }
            };

            const handleComment = async (e, postId) => {
                e.preventDefault();
                const text = replyContent[postId];
                if (!text || !text.trim()) return;

                const post = posts.find(p => p.id === postId);
                if (!post) return;

                const tempCommentId = Date.now();
                const newComment = { id: tempCommentId, author: authUser.name, content: text, timestamp: new Date().toISOString(), isPending: true };
                const newComments = [...post.comments, newComment];

                setPosts(prev => prev.map(p => p.id === postId ? { ...p, comments: newComments } : p));
                setReplyContent({ ...replyContent, [postId]: '' });

                try {
                    const payloadComments = newComments.map(c => { const { isPending, ...rest } = c; return rest; });
                    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateAnnouncement', id: postId, comments: payloadComments }) });
                    setPosts(prev => prev.map(p => p.id === postId ? { ...p, comments: p.comments.map(c => c.id === tempCommentId ? { ...c, isPending: false } : c) } : p));
                } catch(err) { }
            };

            const formatTime = (isoString) => {
                if (!isoString) return '-';
                const d = new Date(isoString);
                if (isNaN(d.getTime())) return '-';
                return d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) + ' - ' + d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
            };

            const currentPosts = posts
                .filter(p => p.channelId === activeChannel)
                .sort((a, b) => {
                    if(activeChannel === 'general') return new Date(a.timestamp) - new Date(b.timestamp); 
                    if (a.pinned !== b.pinned) return b.pinned ? 1 : -1;
                    return new Date(b.timestamp) - new Date(a.timestamp); 
                });

            const renderFeedPost = (p) => (
                <div key={p.id} className={`p-4 mb-4 rounded-xl border ${p.pinned ? 'bg-indigo-50/50 dark:bg-indigo-900/10 border-indigo-200 dark:border-indigo-800' : 'bg-white dark:bg-gray-800 border-gray-100 dark:border-gray-700'} shadow-sm relative group transition-all duration-300 ${p.isPending || p.isDeleting || p.isEditing ? 'opacity-60 grayscale-[30%]' : ''}`}>
                    {p.pinned && <div className="absolute -top-3 -right-2 text-indigo-500 bg-indigo-100 dark:bg-indigo-900 px-2 py-0.5 rounded-full text-[10px] font-bold flex items-center shadow-sm"><i className="ph-fill ph-push-pin mr-1"></i> Pinned</div>}
                    
                    <div className="flex justify-between items-start mb-3">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 text-white flex items-center justify-center font-bold text-lg shadow-inner">{p.author ? p.author.charAt(0) : '?'}</div>
                            <div>
                                <div className="font-bold text-gray-900 dark:text-white flex items-center gap-2">
                                    {p.author || 'Unknown'} 
                                    <span className={`text-[9px] px-1.5 py-0.5 rounded uppercase tracking-wider ${p.role === 'Superadmin' ? 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900 dark:text-indigo-300' : p.role === 'Admin' ? 'bg-amber-100 text-amber-700 dark:bg-amber-900 dark:text-amber-300' : 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-400'}`}>{p.role}</span>
                                </div>
                                <div className="text-xs text-gray-500 flex items-center">
                                    {formatTime(p.timestamp)}
                                    {p.isPending && <span className="italic ml-2 flex items-center text-indigo-500 font-medium"><i className="ph-bold ph-spinner ph-spin mr-1"></i> Mengirim...</span>}
                                    {p.isDeleting && <span className="italic ml-2 flex items-center text-rose-500 font-medium"><i className="ph-bold ph-spinner ph-spin mr-1"></i> Menghapus...</span>}
                                    {p.isEditing && <span className="italic ml-2 flex items-center text-blue-500 font-medium"><i className="ph-bold ph-spinner ph-spin mr-1"></i> Menyimpan...</span>}
                                </div>
                            </div>
                        </div>
                        <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            {canPin() && !p.isPending && !p.isDeleting && !p.isEditing && <button onClick={() => handleTogglePin(p.id)} className={`p-1.5 rounded ${p.pinned ? 'text-indigo-500' : 'text-gray-400 hover:text-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/30'}`}><i className="ph-bold ph-push-pin text-lg"></i></button>}
                            {canEdit(p) && !p.isPending && !p.isDeleting && !p.isEditing && (
                                <button onClick={() => { setEditingPost(p); setEditContent(p.content); }} className="p-1.5 text-gray-400 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded"><i className="ph-bold ph-pencil-simple text-lg"></i></button>
                            )}
                            {canDelete(p) && !p.isPending && !p.isEditing && (
                                <button disabled={p.isDeleting} onClick={() => handleDelete(p.id)} className={`p-1.5 rounded ${p.isDeleting ? 'text-gray-300' : 'text-gray-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/30'}`}><i className="ph-bold ph-trash text-lg"></i></button>
                            )}
                        </div>
                    </div>

                    {editingPost?.id === p.id ? (
                        <form onSubmit={handleEditSubmit} className="mt-2 mb-4 ml-13 pl-13">
                            <textarea 
                                className="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white outline-none focus:ring-2 focus:ring-indigo-500 resize-none text-sm"
                                rows="3"
                                value={editContent}
                                onChange={(e) => setEditContent(e.target.value)}
                                autoFocus
                            />
                            <div className="flex gap-2 mt-2 justify-end">
                                <button type="button" onClick={() => setEditingPost(null)} className="px-4 py-1.5 text-sm font-bold text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-700 rounded-lg transition-colors">Batal</button>
                                <button type="submit" className="px-4 py-1.5 text-sm font-bold bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition-colors shadow-sm">Simpan</button>
                            </div>
                        </form>
                    ) : (
                        <div className="text-gray-800 dark:text-gray-200 text-sm whitespace-pre-wrap mb-4 ml-13 pl-13">{p.content}</div>
                    )}

                    <div className="flex items-center gap-4 pt-3 border-t border-gray-100 dark:border-gray-700">
                        <button disabled={p.isPending || p.isDeleting || p.isEditing} onClick={() => handleToggleLike(p.id)} className={`flex items-center gap-1.5 text-sm font-bold transition-colors ${p.likes.includes(authUser.name) ? 'text-rose-500' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'} disabled:opacity-50`}>
                            <i className={`${p.likes.includes(authUser.name) ? 'ph-fill' : 'ph-bold'} ph-heart text-lg`}></i> {p.likes.length > 0 && p.likes.length} Like
                        </button>
                        <span className="text-sm text-gray-500 font-bold flex items-center gap-1.5"><i className="ph-bold ph-chat-circle text-lg"></i> {p.comments.length} Komentar</span>
                    </div>

                    {p.comments.length > 0 && (
                        <div className="mt-4 pt-4 border-t border-gray-50 dark:border-gray-700/50 space-y-3">
                            {p.comments.map(c => (
                                <div key={c.id} className={`flex gap-3 bg-gray-50 dark:bg-gray-800/50 p-3 rounded-lg ${c.isPending ? 'opacity-60 grayscale-[30%]' : ''}`}>
                                    <div className="w-8 h-8 rounded-full bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 flex items-center justify-center font-bold text-xs shrink-0">{c.author ? c.author.charAt(0) : '?'}</div>
                                    <div className="flex-1">
                                        <div className="flex justify-between items-baseline">
                                            <span className="font-bold text-xs">{c.author || 'Unknown'}</span>
                                            <span className="text-[10px] text-gray-500 flex items-center">
                                                {c.isPending && <span className="italic mr-2 flex items-center text-indigo-500"><i className="ph-bold ph-spinner ph-spin mr-1"></i> Mengirim...</span>}
                                                {formatTime(c.timestamp)}
                                            </span>
                                        </div>
                                        <div className="text-sm mt-0.5 text-gray-700 dark:text-gray-300">{c.content}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                    
                    <form onSubmit={(e) => handleComment(e, p.id)} className="mt-3 flex gap-2 relative">
                        <input type="text" disabled={p.isPending || p.isDeleting || p.isEditing} placeholder={p.isPending || p.isDeleting || p.isEditing ? "Harap tunggu..." : "Tulis komentar..."} value={replyContent[p.id] || ''} onChange={e => setReplyContent({...replyContent, [p.id]: e.target.value})} className="flex-1 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-full px-4 py-2 text-sm outline-none focus:border-indigo-500 transition-colors disabled:opacity-50" />
                        <button type="submit" disabled={!replyContent[p.id] || p.isPending || p.isDeleting || p.isEditing} className="p-2 bg-indigo-600 text-white rounded-full disabled:opacity-50 hover:bg-indigo-700 transition-colors"><i className="ph-bold ph-paper-plane-right"></i></button>
                    </form>
                </div>
            );

            const renderChatMessage = (p) => {
                const isMe = p.author === authUser.name;
                return (
                    <div key={p.id} className={`flex gap-3 mb-4 ${isMe ? 'flex-row-reverse' : ''} group transition-all duration-300 ${p.isPending || p.isDeleting || p.isEditing ? 'opacity-60 grayscale-[30%]' : ''}`}>
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs shrink-0 text-white ${isMe ? 'bg-indigo-500' : 'bg-gray-400 dark:bg-gray-600'}`}>{p.author ? p.author.charAt(0) : '?'}</div>
                        <div className={`flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-[75%]`}>
                            <div className="flex items-baseline gap-2 mb-1">
                                <span className="font-bold text-xs text-gray-600 dark:text-gray-400">{p.author || 'Unknown'}</span>
                                <span className="text-[10px] text-gray-400 flex items-center">
                                    {p.isPending && <span className="italic mr-1 flex items-center text-indigo-400"><i className="ph-bold ph-spinner ph-spin mr-1"></i> Mengirim...</span>}
                                    {p.isDeleting && <span className="italic mr-1 flex items-center text-rose-400"><i className="ph-bold ph-spinner ph-spin mr-1"></i> Menghapus...</span>}
                                    {p.isEditing && <span className="italic mr-1 flex items-center text-blue-400"><i className="ph-bold ph-spinner ph-spin mr-1"></i> Menyimpan...</span>}
                                    {formatTime(p.timestamp)}
                                </span>
                            </div>
                            <div className={`px-4 py-2.5 rounded-2xl text-sm ${isMe ? 'bg-indigo-600 text-white rounded-tr-sm' : 'bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-tl-sm shadow-sm'}`}>
                                {editingPost?.id === p.id ? (
                                    <form onSubmit={handleEditSubmit} className="min-w-[200px]">
                                        <textarea 
                                            className={`w-full p-2 border rounded text-gray-800 dark:text-white outline-none focus:ring-2 focus:ring-indigo-500 resize-none text-xs ${isMe ? 'bg-indigo-500 border-indigo-400 text-white placeholder-indigo-300' : 'bg-gray-50 border-gray-300 dark:bg-gray-700 dark:border-gray-600'}`}
                                            rows="2"
                                            value={editContent}
                                            onChange={(e) => setEditContent(e.target.value)}
                                            autoFocus
                                        />
                                        <div className="flex gap-2 mt-2 justify-end">
                                            <button type="button" onClick={() => setEditingPost(null)} className={`px-2 py-1 text-xs font-bold rounded ${isMe ? 'text-indigo-200 hover:bg-indigo-700' : 'text-gray-500 hover:bg-gray-200 dark:hover:bg-gray-600'}`}>Batal</button>
                                            <button type="submit" className={`px-2 py-1 text-xs font-bold rounded ${isMe ? 'bg-white text-indigo-600 hover:bg-gray-100' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>Simpan</button>
                                        </div>
                                    </form>
                                ) : (
                                    p.content
                                )}
                            </div>
                            <div className="flex gap-2 mt-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button disabled={p.isPending || p.isDeleting || p.isEditing} onClick={() => handleToggleLike(p.id)} className={`text-[10px] font-bold flex items-center gap-1 ${p.likes.includes(authUser.name) ? 'text-rose-500' : 'text-gray-400 hover:text-gray-600'} disabled:opacity-50`}><i className={`${p.likes.includes(authUser.name) ? 'ph-fill' : 'ph-bold'} ph-heart text-xs`}></i> {p.likes.length > 0 && p.likes.length}</button>
                                {canEdit(p) && !p.isPending && !p.isDeleting && !p.isEditing && (
                                    <button onClick={() => { setEditingPost(p); setEditContent(p.content); }} className="text-[10px] font-bold text-blue-400 hover:text-blue-600"><i className="ph-bold ph-pencil-simple"></i></button>
                                )}
                                {canDelete(p) && !p.isPending && !p.isEditing && (
                                    <button disabled={p.isDeleting} onClick={() => handleDelete(p.id)} className={`text-[10px] font-bold ${p.isDeleting ? 'text-gray-300' : 'text-rose-400 hover:text-rose-600'}`}><i className="ph-bold ph-trash"></i></button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            const activeChannelInfo = ANNOUNCEMENT_CHANNELS.find(c => c.id === activeChannel);

            return (
                <div className="h-[calc(100vh-8rem)] md:h-[calc(100vh-10rem)] flex bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden relative">
                    <div className={`absolute md:relative z-20 w-64 h-full bg-gray-50 dark:bg-gray-800/80 backdrop-blur-md border-r border-gray-200 dark:border-gray-700 flex flex-col transition-transform duration-300 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                            <h2 className="font-black text-sm uppercase tracking-widest text-gray-500 flex items-center"><i className="ph-bold ph-hash mr-2"></i> Channels</h2>
                            <button className="md:hidden text-gray-500" onClick={()=>setIsSidebarOpen(false)}><i className="ph-bold ph-x text-lg"></i></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-3 space-y-1 custom-scrollbar">
                            {ANNOUNCEMENT_CHANNELS.map(c => {
                                const unreadCount = posts.filter(p => p.channelId === c.id && new Date(p.timestamp) > new Date(Date.now() - 86400000)).length; 
                                return (
                                <button key={c.id} onClick={() => { setActiveChannel(c.id); setIsSidebarOpen(false); }} className={`w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-sm font-bold transition-all ${activeChannel === c.id ? 'bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-white' : 'text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700/50 hover:text-gray-700 dark:hover:text-gray-300'}`}>
                                    <div className="flex items-center"><i className={`ph-bold ${c.icon} mr-3 text-lg text-${c.color}-500`}></i> {c.name}</div>
                                    {unreadCount > 0 && <span className="bg-indigo-500 text-white text-[10px] px-1.5 py-0.5 rounded-full">{unreadCount}</span>}
                                </button>
                            )})}
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col min-w-0 bg-[#F8FAFC] dark:bg-gray-900">
                        <div className="h-14 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center px-4 shrink-0 shadow-sm z-10">
                            <button className="md:hidden mr-3 text-gray-500" onClick={()=>setIsSidebarOpen(true)}><i className="ph-bold ph-list text-xl"></i></button>
                            <i className={`ph-bold ${activeChannelInfo.icon} text-xl text-${activeChannelInfo.color}-500 mr-2`}></i>
                            <h3 className="font-bold text-gray-900 dark:text-white">{activeChannelInfo.name}</h3>
                            {activeChannel === 'rules' && <span className="ml-3 text-xs bg-rose-100 text-rose-600 px-2 py-0.5 rounded font-bold">Harap Dibaca</span>}
                        </div>

                        <div className={`flex-1 overflow-y-auto p-4 custom-scrollbar ${activeChannel === 'general' ? 'bg-[url("https://www.transparenttextures.com/patterns/cubes.png")] dark:bg-none' : ''}`}>
                            {currentPosts.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-gray-400 opacity-50"><i className={`ph-bold ${activeChannelInfo.icon} text-6xl mb-3`}></i><p>Belum ada postingan di channel ini.</p></div>
                            ) : (
                                activeChannel === 'general' ? currentPosts.map(renderChatMessage) : currentPosts.map(renderFeedPost)
                            )}
                            <div ref={chatEndRef} />
                        </div>

                        {canPost(activeChannel) ? (
                            <div className="p-4 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 shrink-0">
                                <form onSubmit={handlePost} className="relative">
                                    {activeChannel === 'general' ? (
                                        <div className="flex items-end gap-2 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl p-2 focus-within:border-indigo-500 transition-colors">
                                            <input type="text" placeholder="Ketik pesan..." value={newContent} onChange={e => setNewContent(e.target.value)} className="flex-1 bg-transparent border-none outline-none px-3 py-2 text-sm" />
                                            <button type="submit" disabled={!newContent.trim()} className="p-2.5 bg-indigo-600 text-white rounded-lg disabled:opacity-50 transition-colors"><i className="ph-bold ph-paper-plane-right"></i></button>
                                        </div>
                                    ) : (
                                        <div className="bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl p-3 focus-within:border-indigo-500 transition-colors shadow-sm">
                                            <textarea rows="3" placeholder={`Buat postingan baru di #${activeChannelInfo.name}...`} value={newContent} onChange={e => setNewContent(e.target.value)} className="w-full bg-transparent border-none outline-none resize-none text-sm custom-scrollbar"></textarea>
                                            <div className="flex justify-between items-center mt-2 pt-2 border-t border-gray-200 dark:border-gray-700">
                                                <div className="text-xs text-gray-400 font-medium"><i className="ph-bold ph-info mr-1"></i> Posting sebagai <span className="font-bold text-indigo-500">{authUser.role}</span></div>
                                                <button type="submit" disabled={!newContent.trim()} className="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold flex items-center disabled:opacity-50"><i className="ph-bold ph-paper-plane-right mr-2"></i> Posting</button>
                                            </div>
                                        </div>
                                    )}
                                </form>
                            </div>
                        ) : (
                            <div className="p-4 bg-gray-50 dark:bg-gray-800/50 border-t border-gray-200 dark:border-gray-700 text-center text-xs text-gray-500 font-bold shrink-0">
                                <i className="ph-bold ph-lock-key mr-1"></i> Hanya Admin & Superadmin yang dapat membuat postingan di channel ini.
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const ExecutiveDashboard = ({ authUser }) => {
            const [stats, setStats] = useState({
                total: 0, pending: 0, active: 0, failed: 0, recruiters: 0, thisWeek: 0
            });
            const [alerts, setAlerts] = useState({ highRisk: 0, mediumRisk: 0 });
            const [isLoading, setIsLoading] = useState(true);

            const getMondayStr = (dateInput) => {
                if (!dateInput) return "";
                const d = new Date(dateInput);
                if (isNaN(d.getTime())) return "";
                const localDay = d.getDay() || 7;
                const target = new Date(d.getTime());
                target.setDate(d.getDate() - localDay + 1);
                const yyyy = target.getFullYear();
                const mm = String(target.getMonth() + 1).padStart(2, '0');
                const dd = String(target.getDate()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd}`;
            };

            const getOffsetMondayStr = (offsetWeeks = 0) => {
                const d = new Date();
                const day = d.getDay() || 7;
                d.setHours(0,0,0,0);
                d.setDate(d.getDate() - day + 1 + (offsetWeeks * 7));
                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd}`;
            };

            useEffect(() => {
                const fetchDashboardStats = async () => {
                    setIsLoading(true);
                    try {
                        const resUsers = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getUsers' }) });
                        const dataUsers = await resUsers.json();
                        let activeRecruiters = 0;
                        if (dataUsers.status === 'success') {
                            const safeUsers = Array.isArray(dataUsers.data) ? dataUsers.data : [];
                            activeRecruiters = safeUsers.filter(u => u.role === 'Staff' && (u.status === 'Aktif' || u.status === 'Online')).length;
                        }

                        const resData = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getDailyData' }) });
                        const resultData = await resData.json();

                        if (resultData.status === 'success') {
                            const isPrivileged = ['Superadmin', 'Admin'].includes(authUser?.role);
                            const rawData = Array.isArray(resultData.data) ? resultData.data : [];
                            const filteredData = isPrivileged ? rawData : rawData.filter(d => d.recruiter === authUser.username || d.recruiter === authUser.name);

                            const thisWeekMonday = getOffsetMondayStr(0);
                            const today = new Date();
                            today.setHours(0,0,0,0);

                            let sTotal = filteredData.length;
                            let sPending = 0;
                            let sActive = 0;
                            let sFailed = 0;
                            let sThisWeek = 0;
                            let aHighRisk = 0; 
                            let aMediumRisk = 0; 

                            filteredData.forEach(d => {
                                if (d.results === 'Pending') sPending++;
                                if (d.results === 'Acc') sActive++;
                                if (d.results === 'Reject') sFailed++;

                                if (getMondayStr(d.tanggal) === thisWeekMonday) sThisWeek++;

                                if (d.results === 'Pending' && d.tanggal) {
                                    const inputDate = new Date(d.tanggal);
                                    if (!isNaN(inputDate.getTime())) {
                                        inputDate.setHours(0,0,0,0);
                                        const diffTime = Math.abs(today - inputDate);
                                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                                        
                                        if (diffDays > 7) aHighRisk++;
                                        else if (diffDays > 3) aMediumRisk++;
                                    }
                                }
                            });

                            setStats({ total: sTotal, pending: sPending, active: sActive, failed: sFailed, recruiters: activeRecruiters, thisWeek: sThisWeek });
                            setAlerts({ highRisk: aHighRisk, mediumRisk: aMediumRisk });
                        }
                    } catch (error) {
                    } finally {
                        setIsLoading(false);
                    }
                };

                if (authUser) fetchDashboardStats();
            }, [authUser]);

            const funnelDihubungi = stats.total;
            const funnelWawancara = stats.active + stats.failed;
            const funnelDiterima = stats.active;

            const pctDihubungi = stats.total > 0 ? 100 : 0;
            const pctWawancara = stats.total > 0 ? Math.round((funnelWawancara / stats.total) * 100) : 0;
            const pctDiterima = stats.total > 0 ? Math.round((funnelDiterima / stats.total) * 100) : 0;

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                        {[
                            {l:'Total Leads', v:stats.total, i:'ph-users', c:'text-blue-600', b:'bg-blue-50'},
                            {l:'Pending', v:stats.pending, i:'ph-clock', c:'text-amber-600', b:'bg-amber-50'},
                            {l:'Aktif/Yes', v:stats.active, i:'ph-check-circle', c:'text-emerald-600', b:'bg-emerald-50'},
                            {l:'Gugur/No', v:stats.failed, i:'ph-warning-circle', c:'text-rose-600', b:'bg-rose-50'},
                            {l:'Recruiter', v:stats.recruiters, i:'ph-user-gear', c:'text-indigo-600', b:'bg-indigo-50'},
                            {l:'Minggu Ini', v:stats.thisWeek, i:'ph-trend-up', c:'text-violet-600', b:'bg-violet-50'}
                        ].map((k,idx)=>(
                            <Card key={idx} className="p-4 flex flex-col justify-between hover:shadow-md transition-shadow relative">
                                {isLoading && <div className="absolute inset-0 bg-white/50 dark:bg-gray-800/50 backdrop-blur-[2px] z-10 flex justify-center items-center"><i className="ph-bold ph-spinner ph-spin text-indigo-500"></i></div>}
                                <div className="flex justify-between items-start mb-3"><span className="text-sm text-gray-500 font-medium">{k.l}</span><div className={`p-1.5 rounded-lg ${k.b} dark:bg-gray-700`}><i className={`ph-bold ${k.i} text-base ${k.c}`}></i></div></div>
                                <span className="text-2xl font-bold">{isLoading ? '-' : k.v}</span>
                            </Card>
                        ))}
                    </div>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <Card className="p-5 lg:col-span-2 relative">
                            {isLoading && <div className="absolute inset-0 bg-white/50 dark:bg-gray-800/50 backdrop-blur-[2px] z-10 flex justify-center items-center"><i className="ph-bold ph-spinner ph-spin text-indigo-500 text-2xl"></i></div>}
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="font-bold flex items-center"><i className="ph-bold ph-target text-xl mr-2 text-gray-400"></i> Recruitment Funnel</h3>
                                <Badge>All Time</Badge>
                            </div>
                            <div className="space-y-5">
                                <ProgressBar progress={pctDihubungi} label={`Total Leads / Dihubungi (${funnelDihubungi})`} color="bg-blue-500" />
                                <div className="pl-4 sm:pl-6 border-l-2 border-gray-100 dark:border-gray-700 ml-2"><ProgressBar progress={pctWawancara} label={`Telah Diproses / Selesai Pending (${funnelWawancara})`} color="bg-amber-500" /></div>
                                <div className="pl-8 sm:pl-12 border-l-2 border-gray-100 dark:border-gray-700 ml-2"><ProgressBar progress={pctDiterima} label={`Diterima / ACC (${funnelDiterima})`} color="bg-emerald-500" /></div>
                            </div>
                        </Card>
                        
                        <Card className="p-5 flex flex-col relative">
                            {isLoading && <div className="absolute inset-0 bg-white/50 dark:bg-gray-800/50 backdrop-blur-[2px] z-10 flex justify-center items-center"><i className="ph-bold ph-spinner ph-spin text-indigo-500 text-2xl"></i></div>}
                            <h3 className="font-bold mb-4 flex items-center"><i className="ph-bold ph-warning text-xl mr-2 text-rose-500"></i> Follow Up Alerts</h3>
                            <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-3">
                                {alerts.highRisk === 0 && alerts.mediumRisk === 0 ? (
                                    <div className="h-32 flex flex-col items-center justify-center text-gray-400"><i className="ph-bold ph-check-circle text-3xl mb-2 text-emerald-400 opacity-50"></i><p className="text-sm">Semua data pendingan aman!</p></div>
                                ) : (
                                    <>
                                        {alerts.highRisk > 0 && (
                                            <div className="p-3 bg-rose-50 dark:bg-rose-900/20 rounded-lg border border-rose-100 dark:border-rose-900/50">
                                                <span className="text-rose-700 dark:text-rose-400 font-bold text-sm block mb-1">{alerts.highRisk} Kandidat Pending &gt; 7 Hari</span>
                                                <span className="text-rose-500 text-xs">Risiko kehilangan kandidat tinggi. Cek Daily Data.</span>
                                            </div>
                                        )}
                                        {alerts.mediumRisk > 0 && (
                                            <div className="p-3 bg-amber-50 dark:bg-amber-900/20 rounded-lg border border-amber-100 dark:border-amber-900/50">
                                                <span className="text-amber-700 dark:text-amber-400 font-bold text-sm block mb-1">{alerts.mediumRisk} Kandidat Pending &gt; 3 Hari</span>
                                                <span className="text-amber-500 text-xs">Arahkan staff untuk update kepastian kandidat.</span>
                                            </div>
                                        )}
                                    </>
                                )}
                            </div>
                        </Card>
                    </div>
                </div>
            );
        };
        
        const DailyData = ({ authUser }) => {
            const [data, setData] = useState([]);
            const [users, setUsers] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [modalMode, setModalMode] = useState('add');
            const [activeTab, setActiveTab] = useState('thisWeek'); 
            const [historyFilter, setHistoryFilter] = useState(-1); 
            
            const [currentPage, setCurrentPage] = useState(1);
            const itemsPerPage = 10;
            
            const initialForm = { id: '', tanggal: new Date().toISOString().split('T')[0], recruiter: '', channels: 'Instagram', email: '', wa: '', uid: '', username: '', results: 'Pending', grup: 'T0-SANDI' };
            const [formData, setFormData] = useState(initialForm);

            const isPrivileged = ['Superadmin', 'Admin'].includes(authUser?.role);

            const getMondayStr = (dateInput) => {
                if (!dateInput) return "";
                const d = new Date(dateInput);
                if (isNaN(d.getTime())) return "";
                const localDay = d.getDay() || 7;
                const target = new Date(d.getTime());
                target.setDate(d.getDate() - localDay + 1);
                
                const yyyy = target.getFullYear();
                const mm = String(target.getMonth() + 1).padStart(2, '0');
                const dd = String(target.getDate()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd}`;
            };

            const getOffsetMondayStr = (offsetWeeks = 0) => {
                const d = new Date();
                const day = d.getDay() || 7;
                d.setHours(0,0,0,0);
                d.setDate(d.getDate() - day + 1 + (offsetWeeks * 7));
                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd}`;
            };

            const thisWeekMonday = getOffsetMondayStr(0);
            const isThursday = new Date().getDay() === 4;

            const fetchData = async () => {
                setIsLoading(true);
                try {
                    const resUsers = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getUsers' }) });
                    const dataUsers = await resUsers.json();
                    if (dataUsers.status === 'success') setUsers(Array.isArray(dataUsers.data) ? dataUsers.data : []);

                    const resData = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getDailyData' }) });
                    const resultData = await resData.json();
                    if (resultData.status === 'success') {
                        const rawData = Array.isArray(resultData.data) ? resultData.data : [];
                        const filteredData = isPrivileged 
                            ? rawData 
                            : rawData.filter(d => d.recruiter === authUser.username || d.recruiter === authUser.name);
                        setData(filteredData);
                    }
                } catch (error) { console.error("Error fetching data:", error); }
                finally { setIsLoading(false); }
            };

            useEffect(() => { fetchData(); }, []);

            useEffect(() => {
                setCurrentPage(1);
            }, [activeTab, historyFilter, data.length]);

            const handleOpenAdd = () => { 
                setModalMode('add'); 
                setFormData({
                    ...initialForm, 
                    recruiter: authUser.role === 'Staff' ? authUser.username : '' 
                }); 
                setIsModalOpen(true); 
            };
            
            const handleOpenEdit = (item) => { 
                setModalMode('edit'); 
                let safeDate = new Date().toISOString().split('T')[0];
                try {
                    if(item.tanggal) {
                        const d = new Date(item.tanggal);
                        if(!isNaN(d.getTime())) {
                            const offset = d.getTimezoneOffset();
                            safeDate = new Date(d.getTime() - (offset*60*1000)).toISOString().split('T')[0];
                        }
                    }
                } catch(e) {}

                setFormData({ ...item, tanggal: safeDate }); 
                setIsModalOpen(true); 
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const action = modalMode === 'add' ? 'addDailyData' : 'updateDailyData';
                const payload = { ...formData, id: modalMode === 'add' ? Date.now() : formData.id };
                
                try {
                    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action, ...payload }) });
                    fetchData(); setIsModalOpen(false);
                } catch (error) { alert("Terjadi kesalahan."); }
            };

            const handleDelete = async (id) => {
                if (!window.confirm("Yakin ingin menghapus data pelamar ini?")) return;
                try {
                    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteDailyData', id }) });
                    fetchData();
                } catch (error) { alert("Terjadi kesalahan."); }
            };

            const currentDisplayData = data.filter(d => {
                const itemMonday = getMondayStr(d.tanggal);
                if (activeTab === 'thisWeek') {
                    return itemMonday === thisWeekMonday;
                } else {
                    if (historyFilter === 'all') {
                        return itemMonday < thisWeekMonday;
                    }
                    return itemMonday === getOffsetMondayStr(historyFilter);
                }
            });

            const totalPages = Math.ceil(currentDisplayData.length / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedData = currentDisplayData.slice(startIndex, startIndex + itemsPerPage);

            const inputClass = "w-full px-3 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-indigo-500 outline-none text-sm transition-all";
            const Label = ({children}) => <label className="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wider">{children}</label>;

            return (
                <div className="space-y-6">
                    <div className="flex flex-col md:flex-row justify-between gap-4">
                        <div className="flex bg-gray-200 dark:bg-gray-800 p-1 rounded-xl w-full md:w-auto">
                            <button onClick={() => setActiveTab('thisWeek')} className={`flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm font-bold transition-all ${activeTab === 'thisWeek' ? 'bg-white dark:bg-gray-700 text-indigo-600 dark:text-indigo-400 shadow-sm' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}>Minggu Ini</button>
                            <button onClick={() => setActiveTab('lastWeek')} className={`flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm font-bold transition-all flex items-center justify-center ${activeTab === 'lastWeek' ? 'bg-white dark:bg-gray-700 text-indigo-600 dark:text-indigo-400 shadow-sm' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}>
                                Pemeriksaan {isThursday && <span className="flex w-2 h-2 ml-2 bg-rose-500 rounded-full animate-pulse"></span>}
                            </button>
                        </div>
                        {isPrivileged && (
                            <button onClick={handleOpenAdd} className="px-5 py-2.5 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 flex items-center justify-center shadow-lg transition-colors"><i className="ph-bold ph-plus text-lg mr-2"></i> Tambah Data</button>
                        )}
                    </div>

                    <Card className="w-full">
                        <div className={`p-4 border-b border-gray-100 dark:border-gray-700 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 ${activeTab === 'lastWeek' && isThursday ? 'bg-amber-50 dark:bg-amber-900/20' : 'bg-gray-50 dark:bg-gray-800/50'}`}>
                            <div>
                                <h3 className="font-bold flex items-center">
                                    <i className={`ph-bold ${activeTab === 'thisWeek' ? 'ph-calendar-plus text-indigo-500' : 'ph-list-magnifying-glass text-amber-500'} mr-2 text-xl`}></i> 
                                    {activeTab === 'thisWeek' ? 'Data Pelamar Minggu Ini' : 'Evaluasi Pelamar'}
                                </h3>
                                <p className="text-xs text-gray-500 mt-1">
                                    {activeTab === 'thisWeek' 
                                        ? `Rentang Terbuka: Mulai hari Senin ${thisWeekMonday} s/d hari Minggu.` 
                                        : historyFilter === 'all'
                                            ? `Menampilkan seluruh riwayat data pelamar sebelum minggu ini secara permanen.`
                                            : `Rentang Pemeriksaan: ${getOffsetMondayStr(historyFilter)} s/d ${new Date(new Date(getOffsetMondayStr(historyFilter)).getTime() + 6*24*60*60*1000).toLocaleDateString('id-ID')}`}
                                </p>
                            </div>

                            {activeTab === 'lastWeek' && (
                                <div className="flex items-center shrink-0">
                                    <label className="text-xs font-bold text-gray-500 mr-2 uppercase tracking-wider hidden sm:block">Rentang Riwayat:</label>
                                    <select 
                                        value={historyFilter} 
                                        onChange={(e) => setHistoryFilter(e.target.value === 'all' ? 'all' : Number(e.target.value))}
                                        className="w-full sm:w-auto bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-1.5 text-xs font-bold focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm dark:text-white"
                                    >
                                        <option value={-1}>1 Minggu Lalu (Pemeriksaan Utama)</option>
                                        <option value={-2}>2 Minggu Lalu</option>
                                        <option value={-3}>3 Minggu Lalu</option>
                                        <option value="all">Semua Data Lama</option>
                                    </select>
                                </div>
                            )}
                        </div>

                        {isLoading ? (
                            <div className="flex flex-col items-center justify-center py-12 text-gray-400"><i className="ph-bold ph-spinner ph-spin text-3xl mb-2"></i></div>
                        ) : (
                            <div className="overflow-x-auto flex flex-col">
                                <table className="w-full text-left whitespace-nowrap">
                                    <thead className="bg-white dark:bg-gray-800 border-b border-gray-100 dark:border-gray-700 text-xs font-bold text-gray-500 uppercase">
                                        <tr>
                                            <th className="px-5 py-4">Tanggal & Pelamar</th>
                                            <th className="px-5 py-4">Kontak</th>
                                            <th className="px-5 py-4">Recruiter & Channel</th>
                                            <th className="px-5 py-4">Result & Grup</th>
                                            {isPrivileged && <th className="px-5 py-4 text-right">Aksi</th>}
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100 dark:divide-gray-700">
                                        {paginatedData.length === 0 ? (
                                            <tr><td colSpan="5" className="text-center py-8 text-gray-400">Belum ada data pelamar di rentang ini.</td></tr>
                                        ) : paginatedData.map((d, i) => (
                                            <tr key={i} className="hover:bg-gray-50 dark:hover:bg-gray-700/50 group">
                                                <td className="px-5 py-4">
                                                    <div className="text-[10px] text-gray-400 font-bold mb-1">{d.tanggal ? (isNaN(new Date(d.tanggal).getTime()) ? '-' : new Date(d.tanggal).toLocaleDateString('id-ID', {weekday: 'short', day: '2-digit', month: 'short'})) : '-'}</div>
                                                    <div className="font-bold flex items-center gap-2">{d.username}</div>
                                                    <div className="text-xs text-gray-500 mt-1 flex gap-2"><span className="bg-gray-100 dark:bg-gray-700 px-1.5 py-0.5 rounded font-mono">UID: {d.uid}</span><span className="bg-gray-100 dark:bg-gray-700 px-1.5 py-0.5 rounded font-mono">ID: {d.pelamarId || d.id}</span></div>
                                                </td>
                                                <td className="px-5 py-4 text-sm">
                                                    <div className="font-medium text-gray-700 dark:text-gray-300 flex items-center mb-1"><i className="ph-bold ph-whatsapp-logo text-emerald-500 mr-2"></i> {d.wa}</div>
                                                    <div className="text-xs text-gray-500 flex items-center"><i className="ph-bold ph-envelope-simple mr-2"></i> {d.email || '-'}</div>
                                                </td>
                                                <td className="px-5 py-4 text-sm">
                                                    <div className="font-bold flex items-center"><i className="ph-bold ph-user-circle text-indigo-500 mr-2 text-base"></i>{d.recruiter || 'Unknown'}</div>
                                                    <div className="text-xs text-gray-500 mt-1 uppercase font-bold">{d.channels || '-'}</div>
                                                </td>
                                                <td className="px-5 py-4">
                                                    <Badge variant={d.results === 'Acc' ? 'success' : d.results === 'Reject' ? 'danger' : 'warning'}>{d.results}</Badge>
                                                    <div className="text-xs text-gray-500 mt-2 font-bold bg-gray-100 dark:bg-gray-700 w-max px-2 py-0.5 rounded">{d.grup}</div>
                                                </td>
                                                {isPrivileged && (
                                                    <td className="px-5 py-4 text-right">
                                                        <div className="flex justify-end gap-1">
                                                            <button onClick={() => handleOpenEdit(d)} className="p-2 text-gray-400 hover:text-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 rounded-lg"><i className="ph-bold ph-pencil-simple text-lg"></i></button>
                                                            <button onClick={() => handleDelete(d.id)} className="p-2 text-gray-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/30 rounded-lg"><i className="ph-bold ph-trash text-lg"></i></button>
                                                        </div>
                                                    </td>
                                                )}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                                
                                {/* KONTROL PAGINATION */}
                                {totalPages > 0 && (
                                    <div className="flex flex-col sm:flex-row items-center justify-between px-5 py-4 bg-white dark:bg-gray-800 border-t border-gray-100 dark:border-gray-700 gap-3">
                                        <div className="text-xs font-bold text-gray-500 dark:text-gray-400">
                                            Menampilkan <span className="text-gray-900 dark:text-white">{startIndex + 1}</span> - <span className="text-gray-900 dark:text-white">{Math.min(startIndex + itemsPerPage, currentDisplayData.length)}</span> dari <span className="text-gray-900 dark:text-white">{currentDisplayData.length}</span> data
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <button 
                                                onClick={() => setCurrentPage(prev => Math.max(prev - 1, 1))} 
                                                disabled={currentPage === 1}
                                                className="px-3 py-1.5 rounded-lg border border-gray-200 dark:border-gray-600 text-xs font-bold text-gray-600 dark:text-gray-300 disabled:opacity-50 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors flex items-center"
                                            >
                                                <i className="ph-bold ph-caret-left mr-1"></i> Prev
                                            </button>
                                            
                                            <span className="text-xs font-bold px-2 text-gray-500 dark:text-gray-400">
                                                Hal {currentPage} / {totalPages}
                                            </span>

                                            <button 
                                                onClick={() => setCurrentPage(prev => Math.min(prev + 1, totalPages))} 
                                                disabled={currentPage === totalPages}
                                                className="px-3 py-1.5 rounded-lg border border-gray-200 dark:border-gray-600 text-xs font-bold text-gray-600 dark:text-gray-300 disabled:opacity-50 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors flex items-center"
                                            >
                                                Next <i className="ph-bold ph-caret-right ml-1"></i>
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </Card>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-3 sm:p-4">
                            <div className="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" onClick={()=>setIsModalOpen(false)}></div>
                            <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col relative z-10 animate-in zoom-in-95 duration-200">
                                <div className="px-4 sm:px-6 py-4 border-b border-gray-100 dark:border-gray-700 flex justify-between bg-gray-50 dark:bg-gray-800/50"><h2 className="font-bold flex items-center text-lg"><i className={`ph-bold ${modalMode === 'add' ? 'ph-plus-circle' : 'ph-pencil-simple'} text-indigo-600 mr-2 text-xl`}></i> {modalMode === 'add' ? 'Input Data Baru' : 'Edit Data Pelamar'}</h2><button onClick={()=>setIsModalOpen(false)}><i className="ph-bold ph-x text-gray-400 text-xl"></i></button></div>
                                
                                <form onSubmit={handleSubmit} className="p-4 sm:p-6 overflow-y-auto max-h-[85vh] sm:max-h-[75vh] custom-scrollbar">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-5">
                                        <div><Label>Tanggal Input</Label><input type="date" required className={inputClass} value={formData.tanggal} onChange={e=>setFormData({...formData, tanggal: e.target.value})}/></div>
                                        <div><Label>Recruiter (Staff Username)</Label>
                                            <select required className={inputClass} value={formData.recruiter} onChange={e=>setFormData({...formData, recruiter: e.target.value})} disabled={authUser.role === 'Staff'}>
                                                <option value="" disabled>Pilih Staff...</option>
                                                {users.filter(u => u.status === 'Aktif' && u.role === 'Staff').map((u, i) => <option key={i} value={u.username}>{u.name} ({u.username})</option>)}
