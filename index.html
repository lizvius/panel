                                                {formData.recruiter && !users.find(u => u.username === formData.recruiter) && (
                                                    <option value={formData.recruiter}>{formData.recruiter} (Legacy)</option>
                                                )}
                                            </select>
                                        </div>
                                        <div><Label>Nama Pelamar (Username)</Label><input type="text" placeholder="Username Telegram / Nama" required className={inputClass} value={formData.username} onChange={e=>setFormData({...formData, username: e.target.value})}/></div>
                                        <div><Label>UID Pelamar</Label><input type="text" placeholder="Masukkan UID" required className={inputClass} value={formData.uid} onChange={e=>setFormData({...formData, uid: e.target.value})}/></div>
                                        <div><Label>WhatsApp Pelamar</Label><input type="text" placeholder="0812..." required className={inputClass} value={formData.wa} onChange={e=>setFormData({...formData, wa: e.target.value})}/></div>
                                        <div><Label>Email Pelamar</Label><input type="email" placeholder="opsional@mail.com" className={inputClass} value={formData.email} onChange={e=>setFormData({...formData, email: e.target.value})}/></div>
                                        <div><Label>Channels</Label><select className={inputClass} value={formData.channels} onChange={e=>setFormData({...formData, channels: e.target.value})}><option>Instagram</option><option>TikTok</option><option>Facebook</option><option>Website</option><option>Referral</option></select></div>
                                        <div><Label>Grup</Label><select className={inputClass} value={formData.grup} onChange={e=>setFormData({...formData, grup: e.target.value})}><option>T0-MAHA</option><option>T0-LADDY</option><option>T0-SANDI</option><option>T0-MARK</option><option>V0</option><option>T3</option></select></div>
                                        <div className="md:col-span-2"><Label>Keputusan / Result</Label><select className={`${inputClass} font-bold`} value={formData.results} onChange={e=>setFormData({...formData, results: e.target.value})}><option value="Pending">Pending (Menunggu)</option><option value="Acc">Acc (Diterima)</option><option value="Reject">Reject (Ditolak)</option></select></div>
                                    </div>
                                    <div className="mt-8 pt-5 border-t border-gray-100 dark:border-gray-700 flex flex-col-reverse sm:flex-row justify-end gap-3"><button type="button" onClick={()=>setIsModalOpen(false)} className="w-full sm:w-auto px-5 py-2.5 bg-gray-100 dark:bg-gray-700 font-bold rounded-xl hover:bg-gray-200 transition-colors">Batal</button><button type="submit" className="w-full sm:w-auto justify-center px-6 py-2.5 bg-indigo-600 text-white font-bold rounded-xl flex items-center shadow-lg hover:bg-indigo-700 transition-colors"><i className="ph-bold ph-floppy-disk text-lg mr-2"></i> Simpan Data</button></div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const FollowUpCenter = ({ authUser }) => {
            const [data, setData] = useState([]);
            const [isLoading, setIsLoading] = useState(true);

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getDailyData' }) });
                        const result = await res.json();
                        if (result.status === 'success') {
                            const rawData = Array.isArray(result.data) ? result.data : [];
                            const isPrivileged = ['Superadmin', 'Admin'].includes(authUser?.role);
                            setData(isPrivileged ? rawData : rawData.filter(d => d.recruiter === authUser.username || d.recruiter === authUser.name));
                        }
                    } catch (error) {} finally { setIsLoading(false); }
                };
                fetchData();
            }, [authUser]);

            const getPriorityInfo = (days) => {
                if (days > 7) return { level: 'High', color: 'rose', icon: 'ph-warning-circle' };
                if (days > 3) return { level: 'Medium', color: 'amber', icon: 'ph-clock' };
                return { level: 'Low', color: 'blue', icon: 'ph-check-circle' };
            };

            const today = new Date();
            today.setHours(0,0,0,0);

            const categorized = { High: [], Medium: [], Low: [] };
            
            data.filter(c => c.results === 'Pending').forEach(c => {
                let days = 0;
                if (c.tanggal) {
                    const inputDate = new Date(c.tanggal);
                    if (!isNaN(inputDate.getTime())) {
                        inputDate.setHours(0,0,0,0);
                        const diffTime = Math.abs(today - inputDate);
                        days = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                    }
                }
                const p = getPriorityInfo(days);
                categorized[p.level].push({ ...c, days });
            });

            if (isLoading) return <div className="flex justify-center p-12"><i className="ph-bold ph-spinner ph-spin text-4xl text-indigo-500"></i></div>;

            return (
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    {['High', 'Medium', 'Low'].map((level) => {
                        const colItems = categorized[level];
                        const styleInfo = getPriorityInfo(level === 'High' ? 8 : level === 'Medium' ? 4 : 1);
                        
                        return (
                            <Card key={level} className={`border-t-4 border-t-${styleInfo.color}-500 flex flex-col max-h-[75vh]`}>
                                <div className="p-4 border-b border-gray-100 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-800/50 flex justify-between items-center sticky top-0">
                                    <h3 className="font-bold flex items-center text-sm md:text-base"><i className={`ph-bold ${styleInfo.icon} mr-2 text-${styleInfo.color}-500 text-lg`}></i> {level} Priority</h3>
                                    <span className={`bg-${styleInfo.color}-100 text-${styleInfo.color}-800 px-2.5 py-1 rounded-full text-xs font-bold`}>{colItems.length}</span>
                                </div>

        const DailyStats = ({ authUser }) => {
            const [users, setUsers] = useState([]);
            const [dailyCandidates, setDailyCandidates] = useState([]);
            const [perfData, setPerfData] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [weekOffset, setWeekOffset] = useState(0); // 0 = Minggu ini, -1 = Minggu lalu
            const [successMsg, setSuccessMsg] = useState('');

            const isPrivileged = ['Superadmin', 'Admin'].includes(authUser?.role);

            // Form Input (Khusus Admin)
            const [formData, setFormData] = useState({
                tanggal: new Date().toISOString().split('T')[0],
                username: '',
                postingan: '',
                kunjungan: ''
            });

            const getOffsetMondayStr = (offset) => {
                const d = new Date();
                const day = d.getDay() || 7;
                d.setHours(0,0,0,0);
                d.setDate(d.getDate() - day + 1 + (offset * 7));
                const tzOffset = d.getTimezoneOffset() * 60000;
                return new Date(d.getTime() - tzOffset).toISOString().split('T')[0];
            };

            const currentMonday = getOffsetMondayStr(weekOffset);

            const fetchData = async () => {
                setIsLoading(true);
                try {
                    // 1. Ambil User (Sheet 01_TeamMembes)
                    const resUsers = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getUsers' }) });
                    const dataUsers = await resUsers.json();
                    if (dataUsers.status === 'success') setUsers(Array.isArray(dataUsers.data) ? dataUsers.data : []);

                    // 2. Ambil Daily Data (Pelamar)
                    const resCands = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getDailyData' }) });
                    const dataCands = await resCands.json();
                    if (dataCands.status === 'success') setDailyCandidates(Array.isArray(dataCands.data) ? dataCands.data : []);

                    // 3. Ambil Performance Data (Postingan & Kunjungan)
                    // (Menggunakan LocalStorage sebagai basis simulasi agar langsung real-time di UI, sekaligus kirim ke server jika ada)
                    try {
                        const resPerf = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getPerfData' }) });
                        const dataPerf = await resPerf.json();
                        if (dataPerf.status === 'success' && dataPerf.data) {
                            setPerfData(dataPerf.data);
                            localStorage.setItem('recruitOps_perfData', JSON.stringify(dataPerf.data));
                        }
                    } catch (e) {
                        // Fallback ke local
                        const saved = localStorage.getItem('recruitOps_perfData');
                        if (saved) setPerfData(JSON.parse(saved));
                    }
                } catch (error) {
                    console.error("Gagal memuat data laporan.", error);
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => { fetchData(); }, []);

            const handleSavePerf = (e) => {
                e.preventDefault();
                if (!formData.username) return;

                const payload = {
                    id: Date.now(),
                    tanggal: formData.tanggal,
                    username: formData.username,
                    postingan: parseInt(formData.postingan) || 0,
                    kunjungan: parseInt(formData.kunjungan) || 0
                };

                // Update Realtime Local
                const existingIdx = perfData.findIndex(p => p.tanggal === payload.tanggal && p.username === payload.username);
                let newData = [...perfData];
                if(existingIdx >= 0) newData[existingIdx] = payload;
                else newData.push(payload);

                setPerfData(newData);
                localStorage.setItem('recruitOps_perfData', JSON.stringify(newData));

                // Sinkronisasi ke Backend (Fire & Forget)
                fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'addPerfData', ...payload }) }).catch(()=>{});

                setSuccessMsg(`Laporan ${payload.username} tanggal ${payload.tanggal} berhasil disimpan!`);
                setTimeout(() => setSuccessMsg(''), 4000);
                
                // Reset sebagian form
                setFormData({ ...formData, postingan: '', kunjungan: '' });
            };

            // Fungsi Evaluasi Rule Bekerja & Denda
            const evaluateStaffDay = (staffUser, dateStr) => {
                const username = staffUser.username || staffUser.name;

                // Hitung dari Daily Data (Pelamar)
                const candsToday = dailyCandidates.filter(c => {
                    if (c.recruiter !== username) return false;
                    if (!c.tanggal) return false;
                    let safeDate = "";
                    try {
                        const d = new Date(c.tanggal);
                        if (!isNaN(d.getTime())) {
                            safeDate = new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
                        }
                    } catch(e){}
                    return safeDate === dateStr;
                });

                const pelamar = candsToday.length;
                let berkualitas = 0, t0 = 0, v0 = 0;

                candsToday.forEach(c => {
                    if (c.results === 'Acc') {
                        berkualitas++;
                        const g = (c.grup || '').toUpperCase();
                        if (g.includes('V0')) v0++;
                        else t0++; // Default T0 jika Acc
                    }
                });

                const totalHarian = t0 + v0;

                // Ambil Data Kunjungan & Posting
                const perf = perfData.find(p => p.username === username && p.tanggal === dateStr) || { postingan: 0, kunjungan: 0 };
                const postingan = parseInt(perf.postingan) || 0;
                const kunjungan = parseInt(perf.kunjungan) || 0;

                // Logika Bekerja
                let isBekerja = false;
                let reqPosting = 0;

                if (totalHarian >= 3) { isBekerja = true; reqPosting = 0; }
                else if (totalHarian === 2) { isBekerja = postingan >= 30; reqPosting = 30; }
                else if (totalHarian === 1) { isBekerja = postingan >= 60; reqPosting = 60; }
                else { isBekerja = postingan >= 90; reqPosting = 90; }

                return { 
                    username, 
                    pelamar, 
                    berkualitas, 
                    t0, v0, 
                    totalHarian, 
                    postingan, 
                    kunjungan, 
                    isBekerja, 
                    reqPosting,
                    hasInput: perfData.some(p => p.username === username && p.tanggal === dateStr) 
                };
            };

            const staffList = users.filter(u => u.role === 'Staff' && u.status === 'Aktif');

            // Generate 7 Hari Mingguan
            const weekDaysData = [0,1,2,3,4,5,6].map(offset => {
                const d = new Date(currentMonday);
                d.setDate(d.getDate() + offset);
                const tz = d.getTimezoneOffset() * 60000;
                const dateStr = new Date(d.getTime() - tz).toISOString().split('T')[0];
                
                // Evaluasi semua staff di hari ini
                const evaluatedStaff = staffList.map(staff => evaluateStaffDay(staff, dateStr));
                
                // Urutkan (Tercapai > Gagal) & Pisahkan
                const bekerja = evaluatedStaff.filter(s => s.isBekerja).sort((a,b) => b.totalHarian - a.totalHarian);
                const denda = evaluatedStaff.filter(s => !s.isBekerja).sort((a,b) => b.totalHarian - a.totalHarian);

                return {
                    dateObj: d,
                    dateStr,
                    label: d.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' }),
                    bekerja,
                    denda,
                    isFuture: d.setHours(0,0,0,0) > new Date().setHours(0,0,0,0)
                };
            });

            // Kalkulasi Rekap Mingguan Bonus
            const weeklySummary = staffList.map(staff => {
                const username = staff.username || staff.name;
                let hariKerja = 0, hariDenda = 0, totalDenda = 0;
                
                weekDaysData.forEach(day => {
                    if (day.isFuture) return; // Belum waktunya
                    const data = [...day.bekerja, ...day.denda].find(s => s.username === username);
                    if (data) {

                                        <tr>
                                            <th className="px-4 py-3">Nama & Username</th>
                                            <th className="px-4 py-3">Role & UID/ID</th>
                                            <th className="px-4 py-3">Status</th>
                                            <th className="px-4 py-3">Bergabung</th>
                                            <th className="px-4 py-3 text-right">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100 dark:divide-gray-700">
                                        {users.length === 0 ? (
                                            <tr><td colSpan="5" className="text-center py-6 text-gray-500">Belum ada user yang terdaftar.</td></tr>
                                        ) : users.map((u, i) => {
                                            const isPending = u.status === 'Pending';
                                            const canEdit = isSuperadmin || (isAdmin && (u.role === 'Staff' || isPending) && u.role !== 'Superadmin' && u.role !== 'Admin');
                                            const canDelete = isSuperadmin && u.username !== authUser.username;
                                            
                                            const safeName = u.name || 'Unknown';
                                            const safeUsername = u.username || 'Unknown';

                                            return (
                                                <tr key={i} className="hover:bg-gray-50 dark:hover:bg-gray-700/50 group transition-colors">
                                                    <td className="px-4 py-3"><div className="font-bold text-gray-900 dark:text-white">{safeName}</div><div className="text-xs text-gray-500 font-mono mt-1 flex items-center"><i className="ph-bold ph-at mr-1 opacity-70"></i>{safeUsername}</div></td>
                                                    <td className="px-4 py-3">
                                                        <Badge variant={u.role === 'Superadmin' ? 'indigo' : u.role === 'Admin' ? 'warning' : 'default'}>{u.role}</Badge>
                                                        <div className="text-[10px] text-gray-500 mt-1.5"><span className="font-mono">UID: {u.uid || '-'}</span></div>
                                                        <div className="text-[10px] text-gray-500 mt-0.5"><span className="font-mono">ID: {u.id || '-'}</span></div>
                                                    </td>
                                                    <td className="px-4 py-3"><span className="flex items-center text-xs font-bold"><span className={`w-2 h-2 rounded-full mr-2 ${u.status === 'Aktif' || u.status === 'Online' ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]' : u.status === 'Pending' ? 'bg-amber-400' : 'bg-rose-500'}`}></span>{u.status}</span></td>
                                                    <td className="px-4 py-3 text-xs text-gray-500">{formatDate(u.tanggalBergabung)}</td>
                                                    <td className="px-4 py-3 text-right">
                                                        <div className="flex justify-end gap-1 opacity-100 lg:opacity-0 lg:group-hover:opacity-100 transition-opacity">
                                                            {isPending && (isSuperadmin || isAdmin) && (<button onClick={() => handleAcc(u)} className="p-2 text-emerald-500 hover:text-emerald-700 bg-emerald-50 hover:bg-emerald-100 dark:bg-emerald-900/30 dark:hover:bg-emerald-900/50 rounded-lg transition-colors" title="ACC (Terima) User"><i className="ph-bold ph-check-circle text-lg"></i></button>)}
                                                            {canEdit && (<button onClick={() => handleOpenEdit(u)} className="p-2 text-gray-400 hover:text-indigo-500 bg-gray-50 hover:bg-indigo-50 dark:bg-gray-800 dark:hover:bg-indigo-900/30 rounded-lg transition-colors" title="Edit User"><i className="ph-bold ph-pencil-simple text-lg"></i></button>)}
                                                            {canDelete && (<button onClick={() => handleDelete(u.username)} className="p-2 text-gray-400 hover:text-rose-500 bg-gray-50 hover:bg-rose-50 dark:bg-gray-800 dark:hover:bg-rose-900/30 rounded-lg transition-colors" title="Hapus User"><i className="ph-bold ph-trash text-lg"></i></button>)}
                                                        </div>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </Card>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" onClick={()=>setIsModalOpen(false)}></div>
                            <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col relative z-10 animate-in zoom-in-95 duration-200 border-t-4 border-t-indigo-500">
                                <div className="px-6 py-5 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">
                                    <h2 className="font-bold text-lg flex items-center"><i className={`ph-bold ${modalMode === 'add' ? 'ph-user-plus' : 'ph-pencil-simple'} text-indigo-600 mr-2 text-xl`}></i> {modalMode === 'add' ? 'Tambah User Baru' : 'Edit Data User'}</h2>
                                    <button onClick={()=>setIsModalOpen(false)}><i className="ph-bold ph-x text-gray-400 hover:text-rose-500 text-xl transition-colors"></i></button>
                                </div>
                                <form onSubmit={handleSubmit} className="p-6 space-y-5">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                        <div className="sm:col-span-2"><Label>Nama Lengkap</Label><div className="relative"><i className="ph-bold ph-identification-card absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i><input type="text" placeholder="Masukkan nama lengkap" required className={`${inputClass} pl-10`} value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} disabled={isSubmitting} /></div></div>
                                        <div>
                                            <Label>Username Telegram</Label><div className="relative"><i className="ph-bold ph-at absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i><input type="text" placeholder="@username" required className={`${inputClass} pl-10 ${(!isSuperadmin && modalMode === 'edit') ? 'bg-gray-100 dark:bg-gray-700/50 cursor-not-allowed opacity-70' : ''}`} value={formData.username} onChange={e=>setFormData({...formData, username: e.target.value})} disabled={(!isSuperadmin && modalMode === 'edit') || isSubmitting} /></div>
                                            {(!isSuperadmin && modalMode === 'edit') && <span className="text-[10px] text-amber-500 mt-1 block">Username tidak dapat diubah oleh Admin.</span>}
                                        </div>
                                        <div><Label>UID</Label><div className="relative"><i className="ph-bold ph-hash absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i><input type="text" placeholder="Masukkan UID" required className={`${inputClass} pl-10`} value={formData.uid} onChange={e=>setFormData({...formData, uid: e.target.value})} disabled={isSubmitting} /></div></div>
                                        <div><Label>Password {modalMode === 'edit' && '(Opsional)'}</Label><div className="relative"><i className="ph-bold ph-lock-key absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i><input type="password" placeholder={modalMode === 'edit' ? 'Kosongkan jika tak diubah' : 'Buat password'} required={modalMode === 'add'} className={`${inputClass} pl-10`} value={formData.password} onChange={e=>setFormData({...formData, password: e.target.value})} disabled={isSubmitting} /></div></div>
                                        <div>
                                            <Label>Pilih Role</Label>
                                            <select className={inputClass} value={formData.role} onChange={e=>setFormData({...formData, role: e.target.value})} disabled={!isSuperadmin || isSubmitting}>
                                                <option value="Staff">Staff (Akses Terbatas)</option>
                                                {isSuperadmin && <option value="Admin">Admin (Bisa edit data)</option>}
                                                {isSuperadmin && <option value="Superadmin">Superadmin (Akses Penuh)</option>}
                                            </select>
                                            {!isSuperadmin && <span className="text-[10px] text-amber-500 mt-1 block">Anda hanya dapat memilih Staff.</span>}
                                        </div>
                                        <div className="sm:col-span-2"><Label>Status Akun</Label><select className={inputClass} value={formData.status} onChange={e=>setFormData({...formData, status: e.target.value})} disabled={isSubmitting}><option value="Aktif">Aktif</option><option value="Pending">Pending (Menunggu)</option><option value="Nonaktif">Nonaktif / Suspend</option></select></div>
                                    </div>
                                    <div className="pt-4 flex gap-3">
                                        <button type="button" onClick={()=>setIsModalOpen(false)} className="w-1/2 py-3 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 font-bold rounded-xl hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors" disabled={isSubmitting}>Batal</button>
                                        <button type="submit" className="w-1/2 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 flex justify-center items-center transition-colors disabled:opacity-70" disabled={isSubmitting}>{isSubmitting ? <><i className="ph-bold ph-spinner ph-spin mr-2 text-lg"></i> Memproses</> : <><i className="ph-bold ph-floppy-disk mr-2 text-lg"></i> Simpan</>}</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [authUser, setAuthUser] = useState(() => {
                try {
                    const saved = localStorage.getItem('recruitOps_session');
                    return saved ? JSON.parse(saved) : null;
                } catch (error) { return null; }
            });
            const [authView, setAuthView] = useState('login');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            const [isDark, setIsDark] = useState(() => localStorage.getItem('recruitOps_theme') === 'dark');
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            const [isCheckingSession, setIsCheckingSession] = useState(true);
            const [unreadAnnouncements, setUnreadAnnouncements] = useState(0);

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                setTimeout(() => setIsCheckingSession(false), 300);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                const checkUnread = () => {
                    const saved = localStorage.getItem('recruitOps_announcements');
                    if(saved) {
                        const posts = JSON.parse(saved);
                        const recent = posts.filter(p => new Date(p.timestamp) > new Date(Date.now() - 86400000)).length;
                        setUnreadAnnouncements(recent);
                    }
                };
                checkUnread();
                const intv = setInterval(checkUnread, 5000);
                return () => clearInterval(intv);
            }, []);

            useEffect(() => {
                if (isDark) { document.documentElement.classList.add('dark'); localStorage.setItem('recruitOps_theme', 'dark'); }
                else { document.documentElement.classList.remove('dark'); localStorage.setItem('recruitOps_theme', 'light'); }
            }, [isDark]);

            useEffect(() => { if (authUser) setActiveTab(authUser.role === 'Staff' ? 'daily_data' : 'dashboard'); }, [authUser]);

            const login = (user) => { 
                let validRole = user.role ? user.role.toString().trim() : 'Staff';
                validRole = validRole.charAt(0).toUpperCase() + validRole.slice(1).toLowerCase();
                if (!['Superadmin', 'Admin', 'Staff'].includes(validRole)) validRole = 'Staff';
                const finalUser = { ...user, role: validRole };
                setAuthUser(finalUser); 
                localStorage.setItem('recruitOps_session', JSON.stringify(finalUser)); 
            };
            
            const logout = () => { setAuthUser(null); localStorage.removeItem('recruitOps_session'); setAuthView('login'); };
            const changeTab = (id) => { setActiveTab(id); if(isMobile) setSidebarOpen(false); };

            if (isCheckingSession) return (
                <div className={`h-dvh flex items-center justify-center ${isDark ? 'dark bg-gray-900' : 'bg-[#F8FAFC]'}`}>
                    <div className="flex flex-col items-center">
                        <i className="ph-bold ph-spinner ph-spin text-4xl text-indigo-600 dark:text-indigo-400 mb-4"></i>
                        <span className="text-gray-500 dark:text-gray-400 font-bold text-sm">Memuat ruang kerja...</span>
                    </div>
                </div>
            );

            if (!authUser) return (
                <div className={isDark ? 'dark' : ''}>
                    {authView === 'login' ? <Login onLogin={login} onNavigateRegister={()=>setAuthView('register')} /> : <Register onRegister={login} onNavigateLogin={()=>setAuthView('login')} />}
                    <button onClick={()=>setIsDark(!isDark)} className="fixed top-4 right-4 p-3 bg-white dark:bg-gray-800 rounded-full shadow-lg text-gray-500 z-50 transition-transform active:scale-95"><i className={`ph-bold ${isDark?'ph-sun':'ph-moon'} text-xl`}></i></button>
                </div>
            );

            const NAVIGATION = [
                { 
                    s: 'Overview', allowed: ['Superadmin', 'Admin', 'Staff'], 
                    items: [
                        { id: 'dashboard', l: 'Executive Dashboard', i: 'ph-squares-four', roles: ['Superadmin', 'Admin'] },
                        { id: 'announcement', l: 'Announcement Center', i: 'ph-megaphone', roles: ['Superadmin', 'Admin', 'Staff'], badge: unreadAnnouncements },
                        { id: 'follow_up', l: 'Follow Up Center', i: 'ph-bell-ringing', roles: ['Superadmin', 'Admin', 'Staff'] }
                    ] 
                },
                { 
                    s: 'Performance', allowed: ['Superadmin', 'Admin', 'Staff'], 
                    items: [
                        { id: 'performance', l: 'Recruiter Performance', i: 'ph-medal', roles: ['Superadmin', 'Admin', 'Staff'] },
                        { id: 'goals', l: 'Recruitment Goals', i: 'ph-target', roles: ['Superadmin', 'Admin'] },
                        { id: 'channels', l: 'Channel Performance', i: 'ph-megaphone', roles: ['Superadmin', 'Admin'] }
                    ] 
                },
                { 
                    s: 'Management', allowed: ['Superadmin', 'Admin', 'Staff'], 
                    items: [
                        { id: 'daily_data', l: 'Daily Data', i: 'ph-address-book', roles: ['Superadmin', 'Admin', 'Staff'] }, 
                        { id: 'daily_stats', l: 'Daily Stats', i: 'ph-chart-bar', roles: ['Superadmin', 'Admin', 'Staff'] }, 
                        { id: 'payroll', l: 'Payroll', i: 'ph-currency-circle-dollar', roles: ['Superadmin', 'Admin'] },
                        { id: 'users', l: 'User Accounts', i: 'ph-user-gear', roles: ['Superadmin', 'Admin'] }
                    ] 
                },
                { 
                    s: 'System', allowed: ['Superadmin'], 
                    items: [
                        { id: 'settings', l: 'Settings', i: 'ph-gear', roles: ['Superadmin'] }
                    ] 
                }
            ].map(sec => ({ ...sec, items: sec.items.filter(item => item.roles.includes(authUser.role)) })).filter(sec => sec.items.length > 0 && sec.allowed.includes(authUser.role));

            let pageTitle = 'Dashboard';
            NAVIGATION.forEach(sec => sec.items.forEach(item => { if(item.id === activeTab) pageTitle = item.l; }));

            const renderPageContent = () => {
                switch(activeTab) {
                    case 'dashboard': return <ExecutiveDashboard authUser={authUser} />;
                    case 'announcement': return <AnnouncementCenter authUser={authUser} />;
                    case 'follow_up': return <FollowUpCenter authUser={authUser} />;
                    case 'performance': return <RecruiterPerformance authUser={authUser} />;
                    case 'goals': return <RecruitmentGoals authUser={authUser} />;
                    case 'channels': return <ChannelPerformance authUser={authUser} />;
                    case 'daily_data': return <DailyData authUser={authUser} />;
                    case 'daily_stats': return <DailyStats />;
                    case 'payroll': return <Payroll />;
                    case 'users': return <UserManagement authUser={authUser} />;
                    case 'settings': return <SystemSettings />;
                    default: return <ExecutiveDashboard authUser={authUser} />;
                }
            };

            const bottomNavItems = [
                ...(authUser.role !== 'Staff' ? [{ id: 'dashboard', label: 'Home', icon: 'ph-house' }] : []),
                { id: 'announcement', label: 'Comm', icon: 'ph-megaphone', badge: unreadAnnouncements },
                { id: 'daily_data', label: 'Input', icon: 'ph-address-book' },
                { id: 'daily_stats', label: 'Stats', icon: 'ph-chart-bar' },
                { id: 'follow_up', label: 'Follow', icon: 'ph-bell-ringing' }
            ];

            return (
                <div className={`${isDark ? 'dark' : ''} h-dvh overflow-hidden flex flex-col bg-[#F8FAFC] dark:bg-gray-900 transition-colors`}>
                    <div className="flex flex-1 overflow-hidden relative">
                        
                        {isMobile && isSidebarOpen && <div className="fixed inset-0 bg-gray-900/50 dark:bg-black/60 backdrop-blur-sm z-40" onClick={() => setSidebarOpen(false)} />}

                        <aside className={`fixed md:static inset-y-0 left-0 z-50 w-72 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 transform transition-transform duration-300 flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                            <div className="h-16 flex items-center px-6 border-b border-gray-100 dark:border-gray-700 shrink-0">
                            
                                <div className="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center mr-3 shadow-lg shadow-indigo-500/30 border-t border-indigo-400/50 relative overflow-hidden group shrink-0">
                                    <div className="absolute inset-0 bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                    <svg className="w-5 h-5 text-white relative z-10 drop-shadow-md group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M12 2L3 21H7.5L12 11L16.5 21H21L12 2Z" fill="currentColor"/>
                                        <path d="M9.5 15H14.5L12 9.5L9.5 15Z" fill="currentColor" fillOpacity="0.4"/>
                                    </svg>
                                </div>
                                
                                <span className="text-xl font-bold">Team <span className="text-indigo-600">AzurLize</span></span>
                                {isMobile && <button onClick={()=>setSidebarOpen(false)} className="ml-auto text-gray-400 text-xl p-2"><i className="ph-bold ph-x"></i></button>}
                            </div>
                            <div className="flex-1 overflow-y-auto py-6 px-4 custom-scrollbar pb-24 md:pb-6">
                                {NAVIGATION.map((group, idx) => (
                                    <div key={idx} className="mb-6"><h4 className="px-3 text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">{group.s}</h4>
                                        <nav className="space-y-1">{group.items.map(item => (
                                            <button key={item.id} onClick={()=>changeTab(item.id)} className={`w-full relative flex items-center px-3 py-2.5 rounded-xl text-sm font-bold transition-all ${activeTab===item.id ? 'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700'}`}>
                                                <i className={`ph-bold ${item.i} text-xl mr-3 ${activeTab===item.id ? 'text-indigo-600 dark:text-indigo-400' : 'text-gray-400'}`}></i>{item.l}
                                                {item.badge > 0 && <span className="absolute right-3 bg-rose-500 text-white text-[10px] px-2 py-0.5 rounded-full">{item.badge}</span>}
                                            </button>
                                        ))}</nav>
                                    </div>
                                ))}
                            </div>
                            <div className="p-4 border-t border-gray-100 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-800/80 shrink-0 flex items-center justify-between">
                                <div className="flex items-center"><div className="w-10 h-10 rounded-full bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 flex items-center justify-center font-bold">{authUser.name ? authUser.name.charAt(0) : 'U'}</div><div className="ml-3"><p className="text-sm font-bold truncate w-24">{authUser.name || 'User'}</p><p className="text-[10px] uppercase font-bold text-indigo-500">{authUser.role || 'Staff'}</p></div></div>
                                <button onClick={logout} className="p-2 text-gray-400 hover:text-rose-500 bg-gray-100 dark:bg-gray-700 rounded-lg"><i className="ph-bold ph-sign-out text-xl"></i></button>
                            </div>
                        </aside>

                        <main className="flex-1 flex flex-col min-w-0 overflow-hidden relative pb-16 md:pb-0">
                            <header className="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-4 lg:px-8 z-10 shrink-0">
                                <div className="flex items-center">
                                    <h1 className="text-xl font-bold sm:block">{pageTitle}</h1>
                                </div>
                                <div className="flex items-center gap-2">
                                    <button onClick={()=>setIsDark(!isDark)} className="p-2 text-gray-400 bg-gray-50 dark:bg-gray-700 rounded-full transition-colors active:scale-95"><i className={`ph-bold ${isDark?'ph-sun':'ph-moon'} text-xl`}></i></button>
                                </div>
                            </header>
                            
                            <div className="flex-1 overflow-y-auto p-4 lg:p-8 custom-scrollbar">
                                <div className="max-w-7xl mx-auto pb-6">
                                    {renderPageContent()}
                                </div>
                            </div>
                        </main>
                    </div>

                    {isMobile && (
                        <nav className="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 z-40 flex justify-around items-center h-16 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] pb-safe">
                            {bottomNavItems.map((item) => (
                                <button 
                                    key={item.id} 
                                    onClick={() => changeTab(item.id)} 
                                    className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors relative ${activeTab === item.id ? 'text-indigo-600 dark:text-indigo-400' : 'text-gray-400 dark:text-gray-500'}`}
                                >
                                    <div className="relative">
                                        <i className={`${activeTab === item.id ? 'ph-fill' : 'ph'} ${item.icon} text-2xl`}></i>
                                        {item.badge > 0 && <span className="absolute -top-1 -right-2 bg-rose-500 text-white text-[9px] px-1 rounded-full border border-white dark:border-gray-800">{item.badge}</span>}
                                    </div>
                                    <span className="text-[10px] font-bold">{item.label}</span>
                                </button>
                            ))}
                            <button 
                                onClick={() => setSidebarOpen(true)} 
                                className={`flex flex-col items-center justify-center w-full h-full space-y-1 text-gray-400 dark:text-gray-500`}
                            >
                                <i className="ph ph-list text-2xl"></i>
                                <span className="text-[10px] font-bold">Menu</span>
                            </button>
                        </nav>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>

</html>
